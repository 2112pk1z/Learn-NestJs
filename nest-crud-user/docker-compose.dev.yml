services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      TSC_WATCHFILE: DynamicPriorityPolling
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingDynamicPriorityPolling

      NODE_ENV: development
      PORT: 3000

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      DB_NAME: nest_crud_user

      MINIO_PUBLIC_ENDPOINT: localhost
      MINIO_PUBLIC_PORT: 9000
      MINIO_PUBLIC_USE_SSL: false
      MINIO_REGION: us-east-1

      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin123
      MINIO_BUCKET: legal-documents
      MINIO_USE_SSL: false

      JWT_SECRET: K8vN2qX7mLp4Rz9JcT5wHy1BaUf6DsEe
      JWT_EXPIRES_IN_SECONDS: 3600

      ADMIN_EMAIL: admin@gmail.com
      ADMIN_PASSWORD: admin
      ADMIN_NAME: Admin
      ADMIN_PHONE: '0123456789'
      ADMIN_DATE_OF_BIRTH: '2000-01-01'

      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
